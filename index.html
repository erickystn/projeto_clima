<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Previsão do Tempo</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css" />
</head>
<body>

  <div class="card" id="searchCard">
    <h1>Previsão do Tempo</h1>
    <div class="form-row">
      <input type="text" id="cityInput" placeholder="Digite o nome da cidade" autocomplete="off" />
      <button id="searchBtn" onclick="handleSearch()">Buscar</button>
    </div>
    <div class="error-box hidden" id="errorBox">Cidade não encontrada. Tente novamente.</div>
  </div>

  <div class="card hidden" id="resultCard">
    
    <h1 class="result-title">Previsão do Tempo</h1>

    <div class="temp-box">
      <i id="weatherIcon" class="wi wi-na"></i>
      <div class="temp-main">
        <div style="display: flex; align-items: baseline;">
          <span id="tempValue">--</span><span class="degree">°</span>
        </div>
        <span id="tempMinMax" class="current-minmax">/ --°</span>
      </div>
    </div>

    <div class="info-box">
      <p class="city-name" id="cityName">--</p>
      <p id="weatherDesc"></p>
      <p id="dateTime"></p>
    </div>

    <div class="forecast-section">
      <h2 class="forecast-title">Próximos Dias</h2>
      <div id="forecastList" class="forecast-list"></div>
    </div>

    <button class="home-btn" onclick="goHome()" title="Voltar">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
    </button>
  </div>

  <script src="api.js"></script>
</body>
</html>
